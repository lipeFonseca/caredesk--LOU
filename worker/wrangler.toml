name = "caredesk-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ── D1 Database ──────────────────────────────────────────────
[[d1_databases]]
binding  = "DB"
database_name = "caredesk"
database_id   = "COLE_SEU_DATABASE_ID_AQUI"

# ── Variáveis de ambiente (não-secretas) ─────────────────────
[vars]
FRONTEND_URL = "http://localhost:5173"
APP_ENV      = "development"

# ── Secrets (definir via: wrangler secret put NOME) ──────────
# JWT_SECRET
# RESEND_API_KEY

# ── Cron Trigger (roda todo dia às 8h horário de Brasília = 11h UTC) ──
[[triggers]]
crons = ["0 11 * * *"]

# ── Ambiente de produção ─────────────────────────────────────
[env.production]
vars = { FRONTEND_URL = "https://SEU_DOMINIO.com", APP_ENV = "production" }
